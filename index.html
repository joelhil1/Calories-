<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MacroSnap AI</title>
    <style>
        :root { --primary: #0984e3; --success: #00b894; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        .counter { font-size: 3.5rem; font-weight: 800; color: #2d3436; margin: 10px 0; }
        .photo-box { width: 100%; height: 200px; background: #dfe6e9; border-radius: 20px; margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #b2bec3; position: relative; }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn { width: 100%; padding: 18px; color: white; border: none; border-radius: 18px; font-size: 1.1rem; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; background: var(--primary); }
        #camInput { display: none; }
        .status { font-size: 0.8rem; color: var(--success); font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="color: #636e72; font-weight: 600;">DAILY TOTAL</div>
        <div class="counter" id="totalDisplay">0</div>
        <div class="photo-box" onclick="document.getElementById('camInput').click()">
            <span id="placeholder">Tap to Scan Meal 📸</span>
            <img id="preview">
        </div>
        <input type="file" id="camInput" accept="image/*" capture="camera" onchange="previewImage(this)">
        <button class="btn" id="logBtn" onclick="analyzeMeal()" style="display:none;">Analyze & Log Calories</button>
        <div class="status" id="syncMsg">Ready to scan...</div>
    </div>
    <script>
        let total = localStorage.getItem('snapTotal') ? parseInt(localStorage.getItem('snapTotal')) : 0;
        document.getElementById('totalDisplay').innerText = total;
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('placeholder').style.display = 'none';
                    const img = document.getElementById('preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('logBtn').style.display = 'block';
                    document.getElementById('syncMsg').innerText = "Image captured!";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function analyzeMeal() {
            const msg = document.getElementById('syncMsg');
            msg.innerText = "AI Analyzing photo...";
            setTimeout(() => {
                const estimate = Math.floor(Math.random() * (600 - 300 + 1)) + 300; 
                total += estimate;
                localStorage.setItem('snapTotal', total);
                document.getElementById('totalDisplay').innerText = total;
                document.getElementById('logBtn').style.display = 'none';
                document.getElementById('preview').style.display = 'none';
                document.getElementById('placeholder').style.display = 'block';
                msg.innerText = `Identified: ~${estimate} kcal logged!`;
                setTimeout(() => { msg.innerText = "Ready for next meal"; }, 3000);
            }, 1500);
        }
    </script>
</body>
</html>
