<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Date Calculator</title>
    <style>
        :root { --ios-bg: #f2f2f7; --ios-row: #ffffff; --ios-text: #000000; --ios-sub: #8e8e93; --ios-border: #c6c6c8; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--ios-bg); margin: 0; padding: 0; color: var(--ios-text); }
        .header { text-align: center; padding: 15px; font-weight: 600; background: white; border-bottom: 0.5px solid var(--ios-border); }
        .section { margin-top: 20px; border-top: 0.5px solid var(--ios-border); border-bottom: 0.5px solid var(--ios-border); background: var(--ios-row); }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border); }
        .row:last-child { border-bottom: none; }
        .label { font-size: 17px; }
        .value { color: var(--ios-sub); font-size: 17px; }
        input[type="date"] { border: none; font-size: 17px; font-family: inherit; background: none; color: #007aff; outline: none; }
        .footer-tabs { position: fixed; bottom: 0; width: 100%; display: flex; background: #f9f9f9; border-top: 0.5px solid var(--ios-border); padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 10px; color: var(--ios-sub); }
        .tab.active { color: #007aff; }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="header">Date</div>

    <div class="section">
        <div class="row">
            <span class="label">From</span>
            <input type="date" id="fromDate" onchange="calculate()">
        </div>
        <div class="row">
            <span class="label">To</span>
            <input type="date" id="toDate" onchange="calculate()">
        </div>
    </div>

    <div class="section">
        <div class="row">
            <span class="label">Days</span>
            <span class="value" id="resDays">0 Days</span>
        </div>
        <div class="row">
            <span class="label">Weeks</span>
            <span class="value" id="resWeeks">0 Weeks</span>
        </div>
        <div class="row">
            <span class="label">Months</span>
            <span class="value" id="resMonths">0 Months</span>
        </div>
        <div class="row">
            <span class="label">Hours</span>
            <span class="value" id="resHours">0 Hours</span>
        </div>
        <div class="row">
            <span class="label">Minutes</span>
            <span class="value" id="resMinutes">0 Minutes</span>
        </div>
    </div>

    <div class="footer-tabs">
        <div class="tab active"><span class="tab-icon">📅</span>Date</div>
        <div class="tab"><span class="tab-icon">🕒</span>Time</div>
        <div class="tab"><span class="tab-icon">🔢</span>Calculator</div>
        <div class="tab"><span class="tab-icon">⚙️</span>Settings</div>
    </div>

    <script>
        // Set default dates
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fromDate').value = today;
        document.getElementById('toDate').value = today;

        function calculate() {
            const from = new Date(document.getElementById('fromDate').value);
            const to = new Date(document.getElementById('toDate').value);
            
            const diffTime = Math.abs(to - from);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            document.getElementById('resDays').innerText = diffDays + " Days";
            document.getElementById('resWeeks').innerText = (diffDays / 7).toFixed(1) + " Weeks";
            document.getElementById('resMonths').innerText = (diffDays / 30.44).toFixed(1) + " Months";
            document.getElementById('resHours').innerText = (diffDays * 24).toLocaleString() + " Hours";
            document.getElementById('resMinutes').innerText = (diffDays * 1440).toLocaleString() + " Minutes";
        }
    </script>
</body>
</html>
